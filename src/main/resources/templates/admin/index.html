<!DOCTYPE HTML>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<title>Portfolio Admin</title>
<meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
<script src="https://code.jquery.com/jquery-3.3.1.min.js" crossorigin="anonymous"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.14.3/umd/popper.min.js" integrity="sha384-ZMP7rVo3mIykV+2+9J3UJ46jBk0WLaUAdn689aCwoqbBJiSnjAK/l8WvCWPIPm49" crossorigin="anonymous"></script>
<script src="https://stackpath.bootstrapcdn.com/bootstrap/4.1.3/js/bootstrap.min.js" integrity="sha384-ChfqqxuZUCnJSK3+MXmPNIyE6ZbWh2IMqE241rYiqJxyMiZ6OW/JmZQ5stwEULTy" crossorigin="anonymous"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/underscore.js/1.9.1/underscore-min.js"></script>
<script src="../../static/js/tagsinput.js" th:src="@{/js/tagsinput.js}"></script>
<link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.1.3/css/bootstrap.min.css" integrity="sha384-MCw98/SFnGE8fJT3GXwEOngsV7Zt27NXFoaoApmYm81iuXoPkFOJwJ8ERdknLPMO" crossorigin="anonymous">
<link rel="stylesheet" href="https://use.fontawesome.com/releases/v5.3.1/css/all.css" integrity="sha384-mzrmE5qonljUremFsqc01SB46JvROS7bZs3IO2EmfFsd15uHvIt+Y8vEf7N7fWAU" crossorigin="anonymous">
<link rel="stylesheet" href="../../static/css/custom.css" th:href="@{/css/custom.css}" />
<link rel="stylesheet" href="../../static/css/tagsinput.css" th:href="@{/css/tagsinput.css}" />
</head>
<body>
	<nav class="navbar navbar-expand-lg navbar-dark bg-dark fixed-top">
		<div class="container">
			<a class="navbar-brand" href="#">My Portfolio</a>
			<button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarResponsive" aria-controls="navbarResponsive" aria-expanded="false" aria-label="Toggle navigation">
				<span class="navbar-toggler-icon"></span>
			</button>
			<div class="collapse navbar-collapse" id="navbarResponsive">
				<ul class="navbar-nav ml-auto">
					<li class="nav-item"><a class="nav-link" href="/index">Home</a></li>
					<li class="nav-item"><a class="nav-link" href="/admin/index">Admin</a></li>
					<li class="nav-item"><a class="nav-link" href="#">Github</a></li>
					<li class="nav-item"><a class="nav-link" href="#">About</a></li>
					<form method="post" action="#" th:action="@{/logout}">
						<button type="submit">Logout</button>
					</form>
				</ul>
			</div>
		</div>
	</nav>
	<div id="content">
		<section>
			<div class="container">
				<h1>Types</h1>
				<form id="typeForm" method="post" action="#" th:action="@{/admin/type}" th:object="${type}">
					<input type="hidden" id="id" name="id" th:value="${id}"> <input id="name" name="name" th:value="${name}"> <input id="description" name="description" th:value="${description}">
					<button type="submit">Upsert</button>
				</form>
				<table id="types">
					<thead>
						<th>Name</th>
						<th>Description</th>
					</thead>
					<tbody>
						<tr th:each="type : ${types}">
							<td th:text="*{type.name}">Onions</td>
							<td th:text="*{type.description}">2.41</td>
							<td><a name="edit" th:id="*{type.id}" href="#">Edit</a></td>
							<td><a name="delete" th:id="*{type.id}" href="#">Remove</a></td>
						</tr>
					</tbody>
				</table>
			</div>
		</section>
		<section class="color">
			<div class="container">
				<h1>Tech</h1>
				<form id="techForm" method="post" action="#" th:action="@{/admin/tech}" th:object="${tech}">
					<input type="hidden" id="id" name="id" th:value="${id}"> <input id="name" name="name" th:value="${name}"> <input id="image" name="image" th:value="${image}">
					<button type="submit">Upsert</button>
				</form>
				<table id="tech">
					<thead>
						<th>Name</th>
						<th>Image</th>
					</thead>
					<tbody>
						<tr th:each="tech : ${tech}">
							<td th:text="*{tech.name}">Onions</td>
							<td><img class="tech" th:src="*{tech.image}" /></td>
							<td><a name="edit" th:id="*{tech.id}" href="#">Edit</a></td>
							<td><a name="delete" th:id="*{tech.id}" href="#">Remove</a></td>
						</tr>
					</tbody>
				</table>
			</div>
		</section>
		<section>
			<div class="container">
				<h1>Projects</h1>
				<form id="projectForm" method="post" action="#" th:action="@{/admin/project}">
					<input type="hidden" id="id" name="id" /> <input type="checkbox" id="available" name="available" />
					<textarea id="description" name="description"></textarea>
					<input id="image" name="image" /> <input id="name" name="name" /> <select id="status" name="status">
						<option th:each="status : ${statuses}" th:value="${status}" th:text="${status}"></option>
					</select> <input id="tags" name="tags" data-role="tagsinput" />
					<div>
						<input type="checkbox" id="tech" name="tech" th:each="t : ${tech}" th:value="${t.id}" th:text="${t.name}" />
					</div>
					<select id="type" name="type">
						<option th:each="type : ${types}" th:value="${type.id}" th:text="${type.name}" />
					</select> <input id="year" name="year" type="number" />
					<div id="links"></div>
					<button id="new_link_button" type="button">New link</button>
					<button type="submit">Upsert</button>
				</form>
				<div id="new_link" class="link d-none">
					<input id="display" name="display" /> <input id="name" name="name" />
					<button id="remove" type="button">Remove</button>
				</div>
				<table id="projects">
					<thead>
						<th>Available</th>
						<th>Description</th>
						<th>Links</th>
						<th>Logo</th>
						<th>Name</th>
						<th>Status</th>
						<th>Tags</th>
						<th>Tech</th>
						<th>Type</th>
						<th>Year</th>
					</thead>
					<tbody>
						<tr th:each="project : ${projects}">
							<td th:text="*{project.available}">YES</td>
							<td th:text="*{project.description}">2.41</td>
							<td><span th:each="link : *{project.links}" th:text="|*{link.name} - ${link.display}|" /></td>
							<td><img class="logo" src="http://placehold.it/500x300" th:src="*{project.image}" /></td>
							<td th:text="*{project.name}">Onions</td>
							<td th:text="*{project.status}">ACTIVE</td>
							<td th:text="*{project.tags}">tag1,tag2,tag3</td>
							<td><span th:each="tech : *{project.tech}"><img class="tech" th:src="*{tech.image}" /><span th:text="*{tech.name}" /></span></td>
							<td th:text="*{project.type.name}">WEB</td>
							<td th:text="*{project.year}">2041</td>
							<td><a name="edit" th:id="*{project.id}" href="#">Edit</a></td>
							<td><a name="delete" th:id="*{project.id}" href="#">Remove</a></td>
						</tr>
					</tbody>
				</table>
			</div>
		</section>
	</div>
	<!-- #main -->
	<footer>
		<div id="info-bar"></div>
		<!-- /#top-bar -->
	</footer>
	<script th:inline="javascript">
		/*<![CDATA[*/
		$("div#links").on("click", "button#remove", function(e) {
			$(e.target).parents("div.link").remove();
		})

		function addLink(display, name, idx) {
			var newLink = $("div#new_link").clone();
			$(newLink).prop("id", "").toggleClass("d-none");
			$(newLink).find("#display")
					.prop("id", "links[" + idx + "].display").prop("name",
							"links[" + idx + "].display").val(display);
			$(newLink).find("#name").prop("id", "links[" + idx + "].name")
					.prop("name", "links[" + idx + "].name").val(name);
			$("#projectForm #links").append(newLink);
		};

		$("#types a[name=edit]").click(function(e) {
			var url = /*[[@{/admin/type/}]]*/"";
			$.get(url + $(e.target).attr("id"), function(data) {
				$("#typeForm input#id").val(data.id);
				$("#typeForm input#name").val(data.name);
				$("#typeForm input#description").val(data.description);
			});
		});
		$("#types a[name=delete]").click(function(e) {
			var url = /*[[@{/admin/type/delete/}]]*/"";
			$.get(url + $(e.target).attr("id"), function(data) {
				$(e.target).parents("tr").remove();
			});
		});

		$("#tech a[name=edit]").click(function(e) {
			var url = /*[[@{/admin/tech/}]]*/"";
			$.get(url + $(e.target).attr("id"), function(data) {
				$("#techForm input#id").val(data.id);
				$("#techForm input#name").val(data.name);
				$("#techForm input#image").val(data.image);
			});
		});
		$("#tech a[name=delete]").click(function(e) {
			var url = /*[[@{/admin/tech/delete/}]]*/"";
			$.get(url + $(e.target).attr("id"), function(data) {
				$(e.target).parents("tr").remove();
			});
		});

		$("#new_link_button").click(function(e) {
			var count = $("#projectForm #links > div").length;
			addLink(null, null, count);
		});

		$("#projects a[name=edit]").click(
				function(e) {
					var url = /*[[@{/admin/project/}]]*/"";
					$.get(url + $(e.target).attr("id"), function(data) {
						$("#projectForm #id").val(data.id);
						$("#projectForm #available").prop("checked",
								data.available);
						$("#projectForm #description").val(data.description);
						$("#projectForm #name").val(data.name);
						$("#projectForm #image").val(data.image);
						$("#projectForm #status").val(data.status);
						$("#projectForm #year").val(data.year);
						$("#projectForm #tags").val(data.tags);
						$("#projectForm #type").val(data.type.id);
						$("#projectForm #tech").val(data.tech);
						for (var i = 0; i < data.tech.length; i++) {
							$("input#tech[value='" + data.tech[i].id + "']")
									.prop("checked", true);
						}
						for (var i = 0; i < data.links.length; i++) {
							addLink(data.links[i].display, data.links[i].name,
									i);
						}
					});
				});
		$("#projects a[name=delete]").click(function(e) {
			var url = /*[[@{/admin/project/delete/}]]*/"";
			$.get(url + $(e.target).attr("id"), function(data) {
				$(e.target).parents("tr").remove();
			});
		});
		/*]]>*/
	</script>
</body>
</html>
